$font = "CaskaydiaMono Nerd Font Mono"
$accent = $mauve
$accentAlpha = $mauveAlpha

general {
    hide_cursor = true
    ignore_empty_input = true
    fail_timeout = 1200
}

animations {
    enabled = true
}

background {
    monitor =
    #path = screenshot
    path = ~/.config/hypr/bg1.jpg
    color = $base

    blur_passes = 2
    contrast = 0.6916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.01
}

label {
    monitor =
    text = cmd[update:1000] echo "<span>$(date +"%I:%M")</span>"
    color = $accent
    font_size = 40
    font_family = $font
    position = 26, -50
    halign = left
    valign = top
}

label {
    monitor =
    text = cmd[update:1000] echo -e "$(LC_TIME=en_US.UTF-8 date +"%A, %B %d")"
    color = $accent
    font_size = 19
    font_family = $font
    position = 26, -20
    halign = left
    valign = top
}

input-field {
    monitor =
    size = 13%, 3.5%
    outline_thickness = 1

    dots_size = 0.15

    font_family = $font

    inner_color = $surface0
    outer_color = $accent
    check_color = $accent
    fail_color = $red

    font_color = rgb(44, 44, 44)
    fade_on_empty = false
    rounding = 8

    placeholder_text = Password
    fail_text = Wrong password!

    position = 0, -20
    halign = center
    valign = center
}

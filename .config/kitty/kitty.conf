shell /usr/bin/zsh
term xterm-kitty

font_family JetBrainsMono Nerd Font Mono
font_size 10
disable_ligatures always
enable_audio_bell no

foreground #c0b18b
background #151515
background_opacity 0.7
background_blur 2
transparent_background_colors red@0.5 #00ff00@0.3

cursor_trail 1
cursor #8fee96

remember_window_size  yes
remember_window_position yes

# black
color0   #2f2f2f
color8   #555555

# red
color1   #d75f5f
color9   #d75f5f

# green
color2    #d4d232
color10   #8fee96

# yellow
color3    #af865a
color11   #cd950c

# blue
color4   #22c3a1
color12  #22c3a1

# magenta
color5   #775759
color13  #775759

# cyan
color6   #84edb9
color14  #84edb9

# white
color7   #c0b18b
color15  #d8d8d8
